databaseChangeLog:
  - changeSet:
      id: 2022-10-23--0001-user
      author: kpetrovskiy
      preConditions:
        not:
          tableExists:
            tableName: user
      createTable:
        tableName: user
        columns:
          - column:
              name: id
              type: bigint
              autoIncrement: true
              constraints:
                nullable: false
                primaryKey: true
                primaryKeyName: pk_user
          - column:
              name: nick_name
              type: varchar(200)
              constraints:
                nullable: false
          - column:
              name: address
              type: varchar(200)
              constraints:
                nullable: false
          - column:
              name: birthdate
              type: varchar(200)
              constraints:
                nullable: false
          - column:
              name: email
              type: varchar(200)
              constraints:
                nullable: false
                unique: true
          - column:
              name: password
              type: varchar(300)
              constraints:
                nullable: false
          - column:
              name: role
              type: varchar(100)
              constraints:
                nullable: false